[build]
  # Static frontend directory
  publish = "frontend"
  # No build command needed — pure static site
  command = ""
  # Netlify Functions directory (serverless API handlers)
  functions = "netlify/functions"

# ── API Routes → Netlify Serverless Functions ──────────────────────────────
# /api/chat         → netlify/functions/chat.js
# /api/send-feedback → netlify/functions/feedback.js
# These run on Netlify's edge — no external server needed!

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
  force = true

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200
  force = true

[[redirects]]
  from = "/api/send-feedback"
  to = "/.netlify/functions/feedback"
  status = 200
  force = true

# ── SPA Fallback ────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
